# Production-like local run of the dashboard.
#
#   docker compose up --build            # build + run on http://localhost:3000
#   docker compose up -d                 # detached
#   docker compose logs -f app           # tail logs
#   docker compose down                  # stop
#
# Configure via a local `.env` (copy .env.example). Secrets must NOT be baked
# into the image — they're injected at runtime here.

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: acme-dashboard:local
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
      # Pulled from the shell / .env — never hardcode secrets here.
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:?set NEXTAUTH_SECRET in .env}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-}
      NEXT_PUBLIC_USE_MOCK_API: ${NEXT_PUBLIC_USE_MOCK_API:-false}
      NEXT_PUBLIC_MAP_PROVIDER: ${NEXT_PUBLIC_MAP_PROVIDER:-google}
      NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: ${NEXT_PUBLIC_GOOGLE_MAPS_API_KEY:-}
    env_file:
      - path: .env
        required: false
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 3s
      start_period: 15s
      retries: 3
    # Harden the runtime surface.
    read_only: false
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 1g

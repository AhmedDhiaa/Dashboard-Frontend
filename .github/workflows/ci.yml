name: CI

# Quality gates + tests + a production build on every push to main and every PR.
# Mirrors the local `npm run quality` + `vitest` + `next build` so a green CI
# means the branch is releasable. GitLab runs the same steps (see .gitlab-ci.yml).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

# One run per ref; a new push cancels the previous in-progress run.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: "22"
  NEXT_TELEMETRY_DISABLED: "1"
  HUSKY: "0" # never install git hooks in CI

jobs:
  quality:
    name: Quality gates
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      # type-check, lint, validate (architecture), next-auth-pin, leaked-secrets,
      # codegen-flag, i18n-parity, i18n-usage, rsc-boundaries, swagger-drift, color-fn
      - run: npm run quality
      # Blocking gate: production dependencies must carry no high/critical
      # advisories. Prod high/critical count is zero (see
      # SECURITY-HARDENING-REPORT.md); residual advisories, if any, are
      # moderate-or-below and tracked there. devDependencies are excluded
      # (--omit=dev) because they never ship to users.
      - name: Dependency audit (prod, high+ severity)
        run: npm audit --omit=dev --audit-level=high

  test:
    name: Unit tests
    # Run on Linux AND Windows: several prior production bugs were OS-specific
    # (e.g. Windows-only path handling that broke on Linux CI). The dev box is
    # Windows, CI default is Linux — testing both keeps the suite green on each.
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      # Linux leg also enforces the coverage gate (thresholds in vitest.config.ts);
      # Windows runs plain so the OS-parity signal stays fast.
      - name: Unit tests + coverage gate
        if: matrix.os == 'ubuntu-latest'
        run: npm run check:coverage
      - name: Unit tests
        if: matrix.os == 'windows-latest'
        run: npx vitest run

  e2e:
    name: E2E (mock, prod build)
    # Drives the real app (login → navigate → list → a11y) against the PRODUCTION
    # standalone build in mock mode — the artifact that ships, with pre-built
    # chunks (deterministic, no dev on-demand compile). `npm run e2e:prod` serves
    # it via scripts/e2e-prod-serve.mjs. (`npm run test:e2e` runs the same suite
    # against the dev server for fast local iteration.)
    runs-on: ubuntu-latest
    # Run inside Playwright's official image: Chromium + every system library it
    # needs are baked in, so we skip `playwright install --with-deps` and the
    # root `apt-get` step it runs. That step had been hanging to the job timeout
    # when the runner's Ubuntu mirror was unreachable. The image tag MUST match
    # the @playwright/test version in package-lock.json — bump both together.
    container: mcr.microsoft.com/playwright:v1.61.0-noble
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      # Browsers ship inside the image at $PLAYWRIGHT_BROWSERS_PATH; this is a
      # no-op verify that the Chromium build matches the pinned Playwright
      # version (no apt, no --with-deps). It downloads only on version drift.
      - name: Verify Playwright browser
        run: npx playwright install chromium
      - name: Build standalone (mock)
        run: npm run e2e:prod:build
      - name: Functional E2E (production standalone)
        run: npm run e2e:prod
      - name: Upload traces on failure
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: test-results/
          retention-days: 14
          if-no-files-found: ignore

  build:
    name: Production build
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: [quality, test]
    env:
      NODE_ENV: production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      # NODE_ENV=production (job env) would otherwise make `npm ci` omit
      # devDependencies — but `next build` needs them (typescript, tailwind,
      # postcss, react-compiler). --include=dev forces them in, same as the
      # Dockerfile. It also keeps husky present so the prepare script is a
      # no-op under HUSKY=0 instead of "command not found".
      - run: npm ci --include=dev
      # `quality` already ran in its own job — build only (init-entities + next build),
      # then re-check leaked secrets against the produced client bundle.
      - run: npm run init-entities
      - run: npx next build --webpack
      - run: npm run check:leaked-secrets
      - name: Bundle-size budget
        run: npm run check:bundle-budget
        continue-on-error: true
      # Assemble the portable, OS-agnostic publish bundle (standalone server +
      # static + public + start scripts for Linux/Windows) and upload it.
      - run: node scripts/publish.mjs --skip-build
      - name: Upload publish bundle
        uses: actions/upload-artifact@v4
        with:
          name: publish-bundle
          path: dist/*.tar.gz
          retention-days: 14
          if-no-files-found: error

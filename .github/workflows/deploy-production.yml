name: Deploy to production

# Manual promotion only. Re-tags an already-built image as :production and
# triggers the production deploy webhook, then smoke-checks /api/health. The
# `production` environment gate (Settings → Environments → required reviewers)
# is what enforces "a human approves every prod release".

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to promote (e.g. a short SHA, or 'edge')"
        required: true
        default: edge

concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  promote:
    name: Promote & deploy
    runs-on: ubuntu-latest
    environment:
      name: production
      url: ${{ vars.PRODUCTION_URL }}
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Re-tag ${{ inputs.image_tag }} → :production
        run: |
          IMAGE="ghcr.io/${{ github.repository }}"
          docker buildx imagetools create -t "$IMAGE:production" "$IMAGE:${{ inputs.image_tag }}"

      - name: Trigger production deploy
        env:
          HOOK: ${{ secrets.PRODUCTION_DEPLOY_HOOK }}
        run: |
          if [ -z "$HOOK" ]; then echo "PRODUCTION_DEPLOY_HOOK not set — skipping deploy."; exit 0; fi
          curl -fsS -X POST "$HOOK"

      - name: Smoke check /api/health
        env:
          URL: ${{ vars.PRODUCTION_URL }}
        run: |
          if [ -z "$URL" ]; then echo "PRODUCTION_URL not set — skipping health check."; exit 0; fi
          for i in $(seq 1 12); do
            if curl -fsS "$URL/api/health" >/dev/null; then echo "production healthy"; exit 0; fi
            echo "waiting for production… ($i)"; sleep 5
          done
          echo "production health check failed"; exit 1

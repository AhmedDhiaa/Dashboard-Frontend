name: Docker

# Builds the production image and pushes it to the GitHub Container Registry
# (ghcr.io/<owner>/<repo>). Runs on pushes to main (→ :edge) and on version
# tags (→ :1.2.3, :1.2, :latest). PRs build only (no push) to validate the
# Dockerfile without publishing.

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write # push to GHCR

jobs:
  image:
    name: Build & push image
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Only authenticate when we intend to push (not on PRs from forks).
      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=edge,enable={{is_default_branch}}
            type=sha,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          # `NEXT_PUBLIC_*` are inlined into the client bundle at build time, so
          # they MUST be passed here (runtime `-e` is a no-op for the browser).
          # Set them as repository/environment VARIABLES (Settings → Secrets and
          # variables → Actions → Variables); unset ones fall back to the
          # Dockerfile defaults, so an unconfigured repo still builds a valid
          # placeholder image. SENTRY_AUTH_TOKEN is a SECRET (source-map upload).
          # NEXT_PUBLIC_USE_MOCK_API is pinned false so a published image is
          # never mock-wired.
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_SOCKET_URL=${{ vars.NEXT_PUBLIC_SOCKET_URL }}
            NEXT_PUBLIC_CLIENT_ID=${{ vars.NEXT_PUBLIC_CLIENT_ID }}
            NEXT_PUBLIC_BRAND_DOMAIN=${{ vars.NEXT_PUBLIC_BRAND_DOMAIN }}
            NEXT_PUBLIC_APP_NAME=${{ vars.NEXT_PUBLIC_APP_NAME }}
            NEXT_PUBLIC_MAP_PROVIDER=${{ vars.NEXT_PUBLIC_MAP_PROVIDER }}
            NEXT_PUBLIC_GOOGLE_MAPS_API_KEY=${{ vars.NEXT_PUBLIC_GOOGLE_MAPS_API_KEY }}
            NEXT_PUBLIC_SENTRY_DSN=${{ vars.NEXT_PUBLIC_SENTRY_DSN }}
            NEXT_PUBLIC_SENTRY_ENVIRONMENT=${{ vars.NEXT_PUBLIC_SENTRY_ENVIRONMENT }}
            NEXT_PUBLIC_ENABLE_CHAT=${{ vars.NEXT_PUBLIC_ENABLE_CHAT }}
            NEXT_PUBLIC_ENABLE_MAPS=${{ vars.NEXT_PUBLIC_ENABLE_MAPS }}
            NEXT_PUBLIC_RUNTIME_BACKEND=${{ vars.NEXT_PUBLIC_RUNTIME_BACKEND }}
            NEXT_PUBLIC_USE_MOCK_API=false
            SENTRY_AUTH_TOKEN=${{ secrets.SENTRY_AUTH_TOKEN }}
            SENTRY_ORG=${{ vars.SENTRY_ORG }}
            SENTRY_PROJECT=${{ vars.SENTRY_PROJECT }}

  # Auto-deploy main → staging after the image is published. Platform-agnostic:
  # POSTs to your deploy webhook (Render/Fly/k8s trigger/etc.). No-op until the
  # STAGING_DEPLOY_HOOK secret is set, so this never fails an unconfigured repo.
  deploy-staging:
    name: Deploy to staging
    needs: image
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: ${{ vars.STAGING_URL }}
    steps:
      - name: Trigger deploy
        env:
          HOOK: ${{ secrets.STAGING_DEPLOY_HOOK }}
        run: |
          if [ -z "$HOOK" ]; then echo "STAGING_DEPLOY_HOOK not set — skipping deploy."; exit 0; fi
          curl -fsS -X POST "$HOOK"
      - name: Smoke check /api/health
        env:
          URL: ${{ vars.STAGING_URL }}
        run: |
          if [ -z "$URL" ]; then echo "STAGING_URL not set — skipping health check."; exit 0; fi
          for i in $(seq 1 12); do
            if curl -fsS "$URL/api/health" >/dev/null; then echo "staging healthy"; exit 0; fi
            echo "waiting for staging… ($i)"; sleep 5
          done
          echo "staging health check failed"; exit 1

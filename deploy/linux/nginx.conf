# nginx reverse proxy → Next.js standalone server on 127.0.0.1:3000.
# Put TLS termination here; the Node process stays bound to localhost.
#   sudo cp deploy/linux/nginx.conf /etc/nginx/sites-available/acme.conf
#   sudo ln -s /etc/nginx/sites-available/acme.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx

upstream acme_app {
  server 127.0.0.1:3000;
  keepalive 32;
}

server {
  listen 80;
  server_name app.example.com;

  # Once TLS is configured, force HTTPS:
  # return 301 https://$host$request_uri;
  # }
  # server {
  #   listen 443 ssl http2;
  #   server_name app.example.com;
  #   ssl_certificate     /etc/letsencrypt/live/app.example.com/fullchain.pem;
  #   ssl_certificate_key /etc/letsencrypt/live/app.example.com/privkey.pem;

  # Long-cache the immutable hashed assets.
  location /_next/static/ {
    proxy_pass http://acme_app;
    proxy_cache_valid 200 60m;
    add_header Cache-Control "public, max-age=31536000, immutable";
  }

  location / {
    proxy_pass http://acme_app;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    # WebSocket upgrade (SignalR / live features)
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_read_timeout 300s;
  }

  client_max_body_size 25m;
}

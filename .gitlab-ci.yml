# GitLab CI/CD — mirrors .github/workflows (quality → test → build → docker → release).
# A green pipeline means the branch is releasable. Docker images go to the
# project's GitLab Container Registry; tagged builds publish a portable bundle
# as a GitLab Release asset.

stages:
  - quality
  - test
  - build
  - docker
  - release

variables:
  NODE_VERSION: "22"
  NEXT_TELEMETRY_DISABLED: "1"
  HUSKY: "0"
  npm_config_cache: "$CI_PROJECT_DIR/.npm"

# Reusable Node setup: cache the npm download cache keyed on the lockfile.
.node:
  image: node:22-alpine
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - .npm/
  before_script:
    - npm ci --cache .npm --prefer-offline

quality:
  extends: .node
  stage: quality
  script:
    - npm run quality
    - npm audit --omit=dev --audit-level=high || true
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG

test:
  extends: .node
  stage: test
  script:
    - npx vitest run
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG

build:
  extends: .node
  stage: build
  variables:
    NODE_ENV: production
  script:
    - npm run init-entities
    - npx next build --webpack
    - npm run check:leaked-secrets
    - node scripts/publish.mjs --skip-build
  artifacts:
    name: "publish-$CI_COMMIT_SHORT_SHA"
    paths:
      - dist/*.tar.gz
    expire_in: 2 weeks
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG

# Build + push the production image to the project's GitLab Container Registry.
docker:
  stage: docker
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
  script:
    - |
      TAG="${CI_COMMIT_TAG:-edge}"
      docker build -t "$CI_REGISTRY_IMAGE:$TAG" -t "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA" .
      docker push "$CI_REGISTRY_IMAGE:$TAG"
      docker push "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA"
      if [ -n "$CI_COMMIT_TAG" ]; then
        docker tag "$CI_REGISTRY_IMAGE:$TAG" "$CI_REGISTRY_IMAGE:latest"
        docker push "$CI_REGISTRY_IMAGE:latest"
      fi
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG

# Publish the portable bundle as a GitLab Release asset on version tags.
release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  needs:
    - job: build
      artifacts: true
  rules:
    - if: $CI_COMMIT_TAG
  script:
    - echo "Publishing release $CI_COMMIT_TAG"
  release:
    tag_name: "$CI_COMMIT_TAG"
    description: "Automated release $CI_COMMIT_TAG"
